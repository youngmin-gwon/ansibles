---
- name: Ensure gpg is installed
  community.general.homebrew:
    state: present
    name: gpg
  become: false
  tags: macos

- name: Ensure .bashrc exists
  ansible.builtin.file:
    path: "{{ home_path }}/.bashrc"
    state: touch
    mode: "0644"
  tags: unix

- name: Add GPG line to .bashrc if GPG is installed
  ansible.builtin.blockinfile:
    path: "{{ home_path }}/.bashrc"
    block: "export GPG_TTY=$(tty)"
    insertbefore: "^{{ custom_config_end_delimiter }}"
    state: present
    marker: "# --- {mark} gpg ---"
  notify: Reload shell
  tags: macos
