---
- name: Uninstall legacy android-commandlinetools cask
  community.general.homebrew_cask:
    name: android-commandlinetools
    state: absent
  become: false
  tags: macos

- name: Check if android-studio-preview@canary is installed
  ansible.builtin.command: brew list --cask android-studio-preview@canary
  register: android_studio_preview_check
  changed_when: false
  failed_when: false
  become: false
  tags: macos

- name: Install android-studio-preview@canary Cask
  ansible.builtin.command: brew install --cask android-studio-preview@canary
  when: android_studio_preview_check.rc != 0
  become: false
  tags: macos

- name: Determine Android CLI architecture URL
  ansible.builtin.set_fact:
    android_cli_url: "https://dl.google.com/android/cli/latest/{{ 'darwin_arm64' if ansible_architecture == 'arm64' else 'darwin_x86_64' }}/android"
  tags: macos

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.local/bin"
    state: directory
    mode: "0755"
  tags: macos

- name: Download Android CLI binary
  ansible.builtin.get_url:
    url: "{{ android_cli_url }}"
    dest: "{{ ansible_user_dir }}/.local/bin/android"
    mode: "0755"
  tags: macos

- name: Initialize Android CLI environment
  ansible.builtin.command: "{{ ansible_user_dir }}/.local/bin/android init"
  register: android_cli_init
  changed_when: "'Initialized' in android_cli_init.stdout"
  tags: macos

- name: Check currently installed Android SDK components
  ansible.builtin.command: "{{ ansible_user_dir }}/.local/bin/android sdk list"
  register: sdk_list_output
  changed_when: false
  failed_when: false
  tags: macos

- name: Install missing Android SDK components
  ansible.builtin.command: '{{ ansible_user_dir }}/.local/bin/android sdk install "{{ item.sdk_package }}"'
  when:
    - sdk_list_output.stdout is defined
    - item.sdk_package not in sdk_list_output.stdout
  loop:
    - sdk_package: "platform-tools"
    - sdk_package: "platforms/android-36"
    - sdk_package: "build-tools/36.1.0"
    - sdk_package: "system-images/android-36.1/google_apis_ps16k/arm64-v8a"
  tags: macos

- name: Ensure shell configuration files exist
  ansible.builtin.copy:
    content: ""
    dest: "{{ home_path }}/{{ item }}"
    force: false
    mode: "0644"
  loop:
    - .bashrc
    - .zshrc
  tags: macos

- name: Ensure Android SDK paths are in shell configurations
  ansible.builtin.blockinfile:
    path: "{{ home_path }}/{{ item }}"
    block: |
      export ANDROID_SDK_ROOT="{{ android_sdk_root }}"
      export PATH="$HOME/.local/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    insertbefore: "^{{ custom_config_end_delimiter }}"
    state: present
    marker: "# --- {mark} Android SDK ---"
  loop:
    - .bashrc
    - .zshrc
  become: false
  tags: macos
  notify: Reload shell
