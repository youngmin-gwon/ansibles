---
- name: Check current active developer directory
  ansible.builtin.command: xcode-select -p
  register: current_xcode_select_path
  become: false
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Check if xcodes CLI is installed
  ansible.builtin.command: which xcodes
  register: xcodes_check
  become: false
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Ensure xcodes CLI is installed
  ansible.builtin.command: brew install xcodesorg/made/xcodes
  register: brew_xcodes_install
  changed_when: >
    'Installing' in brew_xcodes_install.stdout or
    'Poured' in brew_xcodes_install.stdout or
    '✔︎' in brew_xcodes_install.stdout
  become: false
  when:
    - ansible_os_family == "Darwin"
    - xcodes_check.rc != 0
  tags: macos

- name: Find installed Xcode applications
  ansible.builtin.find:
    paths: /Applications
    patterns: ["Xcode.app", "Xcode-*.app", "Xcode_*.app"]
    file_type: directory
  register: found_xcode_apps
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Install Xcode via App Store (mas) if not found
  community.general.mas:
    id: 497799835
    state: present
  become: false
  when:
    - ansible_os_family == "Darwin"
    - found_xcode_apps.matched == 0
  tags: macos

- name: Set latest Xcode path fact (when Xcode was already installed)
  ansible.builtin.set_fact:
    latest_xcode_path: "{{ found_xcode_apps.files | map(attribute='path') | list | sort | last }}"
  when:
    - ansible_os_family == "Darwin"
    - found_xcode_apps.matched > 0
  tags: macos

- name: Set latest Xcode path fact (when Xcode was newly installed via mas)
  ansible.builtin.set_fact:
    latest_xcode_path: "/Applications/Xcode.app"
  when:
    - ansible_os_family == "Darwin"
    - found_xcode_apps.matched == 0
  tags: macos

- name: Ensure Xcode developer directory is set to the latest Xcode
  ansible.builtin.command: "xcode-select -s {{ latest_xcode_path }}/Contents/Developer"
  become: true
  when:
    - ansible_os_family == "Darwin"
    - current_xcode_select_path.stdout | default('') != (latest_xcode_path ~ '/Contents/Developer')
  tags: macos


- name: Ensure Xcode license is accepted
  ansible.builtin.command: xcodebuild -license accept
  when: ansible_os_family == "Darwin"
  changed_when: false
  become: true
  tags: macos

- name: Ensure Xcode UserData directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
  loop:
    - "{{ xcode_userdata_directory }}"
    - "{{ xcode_userdata_directory }}/KeyBindings"
    - "{{ xcode_userdata_directory }}/FontAndColorThemes"
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Ensure Swift tooling is installed
  ansible.builtin.command: brew install swiftlint swiftformat xcodegen
  register: brew_formula_install
  changed_when: >
    'Installing' in brew_formula_install.stdout or
    'Poured' in brew_formula_install.stdout or
    '✔︎' in brew_formula_install.stdout
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Ensure JetBrains Mono Nerd Font Mono and SwiftFormat extension are installed
  ansible.builtin.command: brew install --cask font-jetbrains-mono-nerd-font swiftformat-for-xcode
  register: brew_cask_install
  changed_when: >
    'Installing' in brew_cask_install.stdout or
    'Downloading' in brew_cask_install.stdout or
    'Success' in brew_cask_install.stdout
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Link static Xcode config files
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    mode: "0644"
    force: true
    follow: false
  with_items:
    - src: "{{ role_path }}/files/github_light_theme.xml"
      dest: "{{ xcode_userdata_directory }}/FontAndColorThemes/Github (Light).xccolortheme"
    - src: "{{ role_path }}/files/github_dark_theme.xml"
      dest: "{{ xcode_userdata_directory }}/FontAndColorThemes/Github (Dark).xccolortheme"
    - src: "{{ role_path }}/files/custom_keybinding.xml"
      dest: "{{ xcode_userdata_directory }}/KeyBindings/Default.idekeybindings"
    - src: "{{ role_path }}/files/.swiftlint.yml"
      dest: "{{ home_path }}/.swiftlint.yml"
    - src: "{{ role_path }}/files/.swiftformat"
      dest: "{{ home_path }}/.swiftformat"
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Set Xcode preferences
  # Settings are stored in ~/Library/Preferences/com.apple.dt.Xcode.plist
  community.general.osx_defaults:
    domain: com.apple.dt.Xcode
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - {
        key: "XCFontAndColorCurrentTheme",
        type: "string",
        value: "Github (Dark).xccolortheme",
      }
    - {
        key: "XCFontAndColorCurrentLightTheme",
        type: "string",
        value: "Github (Light).xccolortheme",
      }
    - {
        key: "XCFontAndColorCurrentDarkTheme",
        type: "string",
        value: "Github (Dark).xccolortheme",
      }
    - { key: "KeyBindingsMode", type: "string", value: "Vi" }
  become: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Set Xcode new project template options
  # IDETemplateOptions is a dict value; must be set as a whole via defaults write
  ansible.builtin.command: >
    defaults write com.apple.dt.Xcode IDETemplateOptions
    -dict
    bundleIdentifierPrefix "{{ xcode_bundle_identifier_prefix }}"
    hostInCloudKit -bool NO
    storageType None
    testingSystem "Swift Testing"
  become: false
  changed_when: false
  when: ansible_os_family == "Darwin"
  tags: macos

- name: Enable SwiftFormat for Xcode extension
  ansible.builtin.command: pluginkit -e use -i com.charcoaldesign.SwiftFormat-for-Xcode.SourceEditorExtension
  become: false
  when: ansible_os_family == "Darwin"
  changed_when: false
  tags: macos

