disabled_rules:
  - trailing_whitespace       # SwiftFormat handles this
  - todo                      # TODOs are fine globally

opt_in_rules:
  - force_unwrapping
  - implicitly_unwrapped_optional
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - last_where
  - legacy_multiple
  - modifier_order
  - prefer_self_type_over_type_of_self
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

line_length:
  warning: 130
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100
