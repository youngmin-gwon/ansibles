---
- name: Ensure bash is installed on Debian-based systems
  ansible.builtin.apt:
    name:
      - bash
      - bash-completion
    state: present
  become: true
  tags: debian

- name: Change admin default shell to bash
  ansible.builtin.shell: chsh -s $(which bash)
  become: true
  changed_when: false
  tags: debian

- name: Change user default shell to bash
  ansible.builtin.shell: chsh -s $(which bash) {{ ansible_user }}
  become: true
  changed_when: false
  tags: debian
