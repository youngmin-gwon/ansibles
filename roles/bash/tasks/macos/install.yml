---
- name: Ensure bash is installed (latest version via Homebrew)
  community.general.homebrew:
    name:
      - bash
      - bash-completion@2
    state: present
  become: false
  tags: macos

- name: Add Homebrew bash to allowed shells
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: /opt/homebrew/bin/bash
    state: present
  become: true
  tags: macos

- name: Change default shell to bash
  ansible.builtin.shell: chsh -s /opt/homebrew/bin/bash $(whoami)
  become: true
  changed_when: false
  tags: macos

- name: Ensure .bashrc exists
  ansible.builtin.file:
    path: "{{ home_path }}/.bashrc"
    state: touch
    mode: "0644"
  tags: unix

- name: Ensure .bashrc includes Homebrew path for Apple Silicon-based machine
  ansible.builtin.blockinfile:
    path: "{{ home_path }}/.bashrc"
    block: "export PATH=/opt/homebrew/bin:$PATH"
    state: present
    insertafter: "^{{ custom_config_start_delimiter }}"
    mode: "0644"
    marker: "# --- {mark} Homebrew ---"
  become: false
  notify: Reload shell
  when:
    - ansible_os_family == "Darwin"
  tags: macos
